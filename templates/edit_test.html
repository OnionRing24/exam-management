{% extends "base.html" %}
{% block body %}
    <div class="body">
        <h1>Edit Test</h1>

        <form action="/edit_test/{{ test['test_id'] }}" method="POST">
            <input type="text" name="test_id" value="{{ test['test_id'] }}" class="input_field" readonly>
            <input type="text" name="title" value="{{ test['title'] }}" class="input_field" required>
            <div id="input-container"></div>
            <button type="button" onclick="addField()">Add Question</button>
            <button type="submit">Register</button>
        </form>
    </div>
    <script>
        function addField() {
            const container = document.getElementById('input-container');
            const div = document.createElement('div');
            div.className = 'input-group'
            div.innerHTML = `
                <input type='text' name='question_text' placeholder='Question'>
                <button type='button' onclick='this.parentElement.remove()'>Remove</button>
            `;
            container.appendChild(div);
        }
    </script>
{% endblock %}
